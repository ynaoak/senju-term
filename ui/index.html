<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senju Term</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script src="vendor/addon-web-links.js"></script>
  <script src="vendor/addon-search.js"></script>
</head>
<body>
  <div id="app">
    <!-- Custom native-like titlebar: the whole bar drags the window; buttons
         inside stay clickable. Native OS chrome is disabled (decorations:false). -->
    <header id="topbar" data-tauri-drag-region>
      <!-- macOS: native-style traffic-light window controls sit on the left -->
      <div id="win-controls-mac" class="win-controls mac">
        <button class="win-btn close" data-win="close" title="閉じる"></button>
        <button class="win-btn min" data-win="minimize" title="最小化"></button>
        <button class="win-btn max" data-win="maximize" title="最大化"></button>
      </div>
      <button id="toggle-threadbar" class="icon-btn" title="スレッド一覧を切替">☰</button>
      <div id="brand" data-tauri-drag-region>❯ Senju</div>
      <div class="spacer" data-tauri-drag-region></div>
      <!-- Tool-panel tabs, centered in the header. Each toggles its panel in
           the right sidebar; clicking the active one again hides the sidebar
           so the terminal can use the full window width. -->
      <nav id="header-tabs">
        <button class="hdr-tab" data-panel="shell">シェル</button>
        <button class="hdr-tab" data-panel="workflows">Workflows</button>
        <button class="hdr-tab" data-panel="hosts">SSH</button>
        <button class="hdr-tab" data-panel="profiles">端末</button>
        <button class="hdr-tab" data-panel="settings">設定</button>
      </nav>
      <div class="spacer" data-tauri-drag-region></div>
      <button id="split-toggle" class="ghost-btn" title="ペインを上下分割 (Ctrl+Shift+D)">⬒ 分割</button>
      <button id="palette-btn" class="ghost-btn" title="コマンドパレット (Ctrl+Shift+P)">⌕ パレット <kbd>Ctrl⇧P</kbd></button>
      <!-- Windows / Linux: window controls on the right. Plain Unicode glyphs
           so they render without the Segoe icon font (absent on Linux). -->
      <div id="win-controls" class="win-controls">
        <button class="win-btn" data-win="minimize" title="最小化">&#x2212;</button>
        <button class="win-btn" data-win="maximize" title="最大化">&#x25A1;</button>
        <button class="win-btn close" data-win="close" title="閉じる">&#x2715;</button>
      </div>
    </header>

    <div id="body">
      <!-- 左: スレッド一覧 -->
      <aside id="threadbar">
        <div class="threadbar-head">
          <span class="threadbar-title">スレッド</span>
          <!-- Split button: click launches the default profile; ▾ opens a
               Windows-Terminal-style menu of all profiles. -->
          <div class="new-thread-group">
            <button id="new-thread" class="accent-btn" title="新しいスレッド (既定プロファイル / Ctrl+Shift+T)">＋ 新規</button>
            <button id="new-thread-menu" class="accent-btn caret" title="プロファイルを選択">▾</button>
          </div>
        </div>
        <ul id="thread-list"></ul>
      </aside>

      <!-- 中央: ペイン (上下分割可能) -->
      <main id="terminals">
        <!-- ワークフローのクイック起動バー (シェル表示時のみ) -->
        <div id="wf-quickbar" class="hidden"></div>
        <!-- ターミナル内検索バー (Ctrl+Shift+F) -->
        <div id="term-search" class="term-search hidden">
          <input id="term-search-input" type="text" placeholder="検索…" autocomplete="off" />
          <button id="term-search-prev" class="icon-btn" title="前を検索 (Shift+Enter)">↑</button>
          <button id="term-search-next" class="icon-btn" title="次を検索 (Enter)">↓</button>
          <button id="term-search-close" class="icon-btn" title="閉じる (Esc)">✕</button>
        </div>
      </main>

      <!-- 右: ワークフロー / SSH / プロファイル / 設定。タブはヘッダー中央 (#header-tabs) -->
      <aside id="sidebar">
        <section id="panel-workflows" class="panel active">
          <div class="panel-head">
            <input id="wf-search" type="search" placeholder="コマンドを検索…" />
            <button id="wf-add" class="accent-btn">＋ 登録</button>
          </div>
          <ul id="wf-list" class="card-list"></ul>
        </section>

        <section id="panel-hosts" class="panel">
          <div class="panel-head">
            <input id="host-search" type="search" placeholder="ホストを検索…" />
            <button id="host-add" class="accent-btn">＋ 登録</button>
          </div>
          <ul id="host-list" class="card-list"></ul>
        </section>

        <section id="panel-profiles" class="panel">
          <div class="panel-head">
            <span class="panel-note">起動するシェルを選べます。★ が既定です。</span>
            <button id="profile-add" class="accent-btn">＋ 追加</button>
          </div>
          <ul id="profile-list" class="card-list"></ul>
        </section>

        <section id="panel-settings" class="panel">
          <form id="settings-form" class="form">
            <label>フォントサイズ
              <input name="font_size" type="number" min="8" max="32" />
            </label>
            <label>フォントファミリー (空欄 = 既定)
              <input name="font_family" type="text" placeholder='"JetBrains Mono", monospace' />
            </label>
            <label>スクロールバック行数
              <input name="scrollback" type="number" min="1000" max="100000" />
            </label>
            <label>既定のターミナルプロファイル
              <select name="default_profile_id"></select>
            </label>
            <button type="submit" class="accent-btn">保存</button>
          </form>
          <p class="hint">設定・登録データは JSON ファイルとしてアプリ設定ディレクトリに保存されます。</p>
        </section>
      </aside>
    </div>
  </div>

  <!-- 非表示スレッドの DOM 退避先 -->
  <div id="thread-parking"></div>

  <!-- プロファイル選択メニュー (新規スレッドの ▾) -->
  <div id="profile-menu" class="popup-menu hidden"></div>

  <!-- コマンドパレット -->
  <div id="palette" class="overlay hidden">
    <div class="palette-box">
      <input id="palette-input" type="text" placeholder="コマンド・ワークフロー・SSH ホストを検索…" autocomplete="off" />
      <ul id="palette-results"></ul>
    </div>
  </div>

  <!-- 汎用モーダル -->
  <div id="modal" class="overlay hidden">
    <div class="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="ghost-btn">キャンセル</button>
        <button id="modal-ok" class="accent-btn">OK</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
