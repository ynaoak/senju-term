name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-app
      - name: Core tests (no GUI deps required)
        working-directory: apps/desktop-app
        run: cargo test -p senju-core

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-app

      - name: Build app (and attach installers to a draft release on v* tags)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-app
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Senju Term {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload bundles
        uses: actions/upload-artifact@v5
        with:
          name: senju-term-${{ matrix.platform }}
          path: |
            apps/desktop-app/target/**/release/bundle/**/*.deb
            apps/desktop-app/target/**/release/bundle/**/*.rpm
            apps/desktop-app/target/**/release/bundle/**/*.AppImage
            apps/desktop-app/target/**/release/bundle/**/*.dmg
            apps/desktop-app/target/**/release/bundle/**/*.app.tar.gz
            apps/desktop-app/target/**/release/bundle/**/*.msi
            apps/desktop-app/target/**/release/bundle/**/*.exe
          if-no-files-found: ignore
